name: 在线构建并发布 Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 MSBuild
      uses: microsoft/setup-msbuild@v1
      with:
        msbuild-version: '17'

    - name: 还原 NuGet 包
      run: nuget restore p2pconn.sln

    - name: 编译 Release (直接构建 csproj，跳过 sln 平台映射)
      run: msbuild p2pconn/p2pconn.csproj /p:Configuration=Release /p:Platform=AnyCPU /verbosity:minimal

    - name: 列出构建产物
      run: ls -R ./p2pconn/bin/Release
      shell: bash

    - name: 整理可执行程序目录
      shell: bash
      run: |
        mkdir -p publish
        cp ./p2pconn/bin/Release/p2p.exe publish/LDesktop.exe
        # 把 Newtonsoft.Json.dll 一并打包随 exe 同目录
        cp ./packages/Newtonsoft.Json.13.0.1/lib/net45/Newtonsoft.Json.dll publish/ 2>/dev/null || true
        ls -la publish/

    - name: 上传构建产物 (Actions Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: LDesktop-Windows
        path: publish/*

    - name: 发布到 GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: LDesktop v1.0.${{ github.run_number }}
        body: |
          # LDesktop 远程协助

          ## 使用说明
          下载下方 **LDesktop.zip**，解压后双击 `LDesktop.exe` 即可运行。

          ## 使用流程
          1. A 和 B 双方都打开 LDesktop
          2. B 把界面上显示的 "外网 IP" 复制发送给 A
          3. A 在 "远端地址" 中粘贴 B 的 IP:端口，点击 "连接远程"
          4. 连接成功后，B 点击 "远程桌面" 让 A 看到桌面
          5. A 可直接通过鼠标键盘操作 B 的电脑

          ## 构建信息
          - Source: ${{ github.repository }}
          - Commit: ${{ github.sha }}
          - Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## 运行环境
          - Windows 7 及以上
          - .NET Framework 4.8 (Win10 及以上系统已自带)
        files: |
          publish/LDesktop.exe
          publish/Newtonsoft.Json.dll
        prerelease: false
