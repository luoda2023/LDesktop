name: 在线构建 Windows 便携版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci
        shell: bash

      - name: 编译 (electron-vite build)
        run: npx electron-vite build
        shell: bash

      - name: 打包 (electron-builder portable)
        run: npx electron-builder --win portable
        shell: bash

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: LDesktop-Windows-Portable
          path: release/*.exe
