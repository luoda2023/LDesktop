appId: com.rdm.desktop.manager
productName: Windows运维远程桌面管理工具
forceCodeSigning: false
asar: true

directories:
  output: release
  buildResources: resources

files:
  - package.json
  - "out/main/**/*"
  - "out/preload/**/*"
  - "out/renderer/**/*"
  - "resources/**/*"

win:
  target: portable
  icon: resources/icon.ico
  signAndEditExecutable: true

portable:
  artifactName: ${productName}-${version}.${ext}
